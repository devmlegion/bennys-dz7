<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora - Mecânica BennysDZ7</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
  
</head>
<body>

<header class="top-bar">
    <button class="theme-toggle-btn" title="Benny's Oficial">
      <i class="fas fa-gear icon-gear"></i>
    </button>
    <div class="top-bar-inner">
      <div class="total-box">
        <strong id="total">0</strong>
      </div>
    </div>
  <button class="reset-btn" onclick="resetCalculator()" title="Resetar Calculadora">
    <i class="fas fa-trash"></i>
  </button>
</header>

<main class="container">

<!-- ================= MELHORIAS ================= -->
<section class="box">
  <h2 class="servicos-header">Melhorias</h2>
  <div class="field">
    <label>Motor</label>
    <select id="motor">
      <option value="0">Nenhum</option>
      <option value="267500">Nível Máx - $ 267.500</option>
    </select>
  </div>

  <div class="field">
    <label>Freio</label>
    <select id="freio">
      <option value="0">Nenhum</option>
      <option value="250000">Nível Máx - $ 250.000</option>
    </select>
  </div>

  <div class="field">
    <label>Transmissão</label>
    <select id="transmissao">
      <option value="0">Nenhum</option>
      <option value="267500">Nível Máx - $ 267.500</option>
    </select>
  </div>

  <div class="field">
    <label>Suspensão</label>
    <select id="suspensao">
      <option value="0">Nenhum</option>
      <option value="215000">Nível Máx - $ 215.000</option>
    </select>
  </div>

  <div class="field combo">
    <label>Blindagem</label>
    <select id="blindagem">
      <option value="0">Nenhum</option>
      <option value="200000">Nível Máx - $ 200.000</option>
    </select>
  </div>

<h2 class="servicos-header">Combos</h2>

  <div class="checkbox-row combo">
    <label>Tuning sem Blindagem <span class="price">$ 1.000.000</span></label>
    <input type="checkbox" id="fullTuning">
  </div>

  <div class="checkbox-row combo">
    <label>Tuning com Blindagem <span class="price">$ 1.200.000</span></label>
    <input type="checkbox" id="fullTuningBlind">
  </div>

  <!-- <h2 class="vendas-header"> -->
<h2 class="vendas-header vendas-section">
  Vendas
  <label class="vendas-checkbox-label">
    <input type="checkbox" id="vendasSwitch">
    <i class="fas fa-handshake" title="Parceria"></i>
  </label>
</h2>

  <div class="counter-row">
    <div class="counter-label">Kit<span class="price">$ 25.000</span></div>

    <div class="counter-controls">
      <button onclick="changeQty(this,-1)">-</button>

      <input
        type="number"
        class="qty-input"
        min="0"
        max="500"
        value="0"
        data-qty
        data-price="25000"
        oninput="updateInputQty(this)"
      >

      <button onclick="changeQty(this,1)">+</button>
    </div>
  </div>

  <div class="counter-row">
    <div class="counter-label">Pneu<span class="price">$ 15.000</span></div>

    <div class="counter-controls">
      <button onclick="changeQty(this,-1)">-</button>

      <input
        type="number"
        class="qty-input"
        min="0"
        max="500"
        value="0"
        data-qty
        data-price="15000"
        oninput="updateInputQty(this)"
      >

      <button onclick="changeQty(this,1)">+</button>
    </div>
  </div>

  <div class="counter-row">
    <div class="counter-label">Chave<span class="price">$ 15.000</span></div>

    <div class="counter-controls">
      <button onclick="changeQty(this,-1)">-</button>

      <input
        type="number"
        class="qty-input"
        min="0"
        max="500"
        value="0"
        data-qty
        data-price="15000"
        oninput="updateInputQty(this)"
      >

      <button onclick="changeQty(this,1)">+</button>
    </div>
  </div>

  <div class="comissao-row counter-row">
  <div class="counter-label">
    Valor à Depositar
  </div>

  <div id="comissao30">
    0
  </div>
</div>

</section>

<!-- ================= ESTÉTICA ================= -->
<section class="box">
  <h2 class="servicos-header">Estética</h2>

  <div class="checkbox-row"><label>Pintura Primária <span class="price">$ 14.000</span></label><input type="checkbox" data-price="14000"></div>
  <div class="checkbox-row"><label>Pintura Secundária <span class="price">$ 24.000</span></label><input type="checkbox" data-price="24000"></div>
  <div class="checkbox-row"><label>Pintura Perolado <span class="price">$ 24.000</span></label><input type="checkbox" data-price="24000"></div>
  <div class="checkbox-row"><label>Pintura Cromada <span class="price">$ 120.000</span></label><input type="checkbox" data-price="120000"></div>
  <div class="checkbox-row"><label>Decalque <span class="price">$ 26.000</span></label><input type="checkbox" data-price="26000"></div>
 
  <div class="checkbox-row"><label>Placa <span class="price">$ 18.000</span></label><input type="checkbox" data-price="18000"></div>
  <div class="checkbox-row"><label>Buzina <span class="price">$ 18.000</span></label><input type="checkbox" data-price="18000"></div>

  <div class="checkbox-row"><label>Janela <span class="price">$ 22.000</span></label><input type="checkbox" data-price="22000"></div>
  <div class="checkbox-row"><label>Bancos <span class="price">$ 15.000</span></label><input type="checkbox" data-price="15000"></div>
 
  <div class="checkbox-row"><label>Troca de Roda <span class="price">$ 62.000</span></label><input type="checkbox" data-price="62000"></div>
  <div class="checkbox-row"><label>Cor das Rodas <span class="price">$ 32.000</span></label><input type="checkbox" data-price="32000"></div>
  <div class="checkbox-row"><label>Cor da Fumaça <span class="price">$ 28.000</span></label><input type="checkbox" data-price="28000"></div>
  <div class="checkbox-row"><label>Custom Rodas <span class="price">$ 28.000</span></label><input type="checkbox" data-price="28000"></div>

  <div class="checkbox-row"><label>Para-lama <span class="price">$ 24.000</span></label><input type="checkbox" data-price="24000"></div>
  <div class="checkbox-row"><label>Teto <span class="price">$ 24.000</span></label><input type="checkbox" data-price="24000"></div>
  <div class="checkbox-row"><label>Enfeites <span class="price">$ 24.000</span></label><input type="checkbox" data-price="24000"></div>
  <div class="checkbox-row"><label>Ponteiros <span class="price">$ 24.000</span></label><input type="checkbox" data-price="24000"></div>
  <div class="checkbox-row"><label>Painel <span class="price">$ 24.000</span></label><input type="checkbox" data-price="24000"></div>

</section>

<!-- ================= ESTÉTICA 2 ================= -->
<section class="box">
  <h2 class="servicos-header">Estética 2</h2>

  <div class="checkbox-row"><label>Aerofólio <span class="price">$ 26.000</span></label><input type="checkbox" data-price="26000"></div>
  <div class="checkbox-row"><label>Parachoque Dianteiro <span class="price">$ 26.000</span></label><input type="checkbox" data-price="26000"></div>
  <div class="checkbox-row"><label>Parachoque Traseiro <span class="price">$ 26.000</span></label><input type="checkbox" data-price="26000"></div>
  <div class="checkbox-row"><label>Saias Laterais <span class="price">$ 26.000</span></label><input type="checkbox" data-price="26000"></div>
  <div class="checkbox-row"><label>Escapamento <span class="price">$ 26.000</span></label><input type="checkbox" data-price="26000"></div>
  <div class="checkbox-row"><label>Grelha <span class="price">$ 26.000</span></label><input type="checkbox" data-price="26000"></div>
  <div class="checkbox-row"><label>Capô <span class="price">$ 26.000</span></label><input type="checkbox" data-price="26000"></div>
  <div class="checkbox-row"><label>Capa do Farol <span class="price">$ 26.000</span></label><input type="checkbox" data-price="26000"></div>
  <div class="checkbox-row"><label>Portas <span class="price">$ 26.000</span></label><input type="checkbox" data-price="26000"></div>
  <div class="checkbox-row"><label>Gaiola <span class="price">$ 26.000</span></label><input type="checkbox" data-price="26000"></div>

  <div class="checkbox-row"><label>Neon <span class="price">$ 80.000</span></label><input type="checkbox" data-price="80000"></div>
  <div class="checkbox-row"><label>Xenon <span class="price">$ 80.000</span></label><input type="checkbox" data-price="80000"></div>

<!-- ================= SERVIÇOS ================= -->
  <h2 class="servicos-header">Serviços</h2>

  <div class="checkbox-row combo"><label>Reparo na MEC <span class="price">$ 20.000</span></label><input type="checkbox" data-price="20000"></div>
  <div class="checkbox-row"><label>Reparo no Sul <span class="price">$ 30.000</span></label><input type="checkbox" data-price="30000"></div>
  <div class="checkbox-row"><label>Reparo no Norte <span class="price">$ 50.000</span></label><input type="checkbox" data-price="50000"></div>
  <div class="checkbox-row"><label>Pneu na MEC <span class="price">$ 20.000</span></label><input type="checkbox" data-price="20000"></div>

</section>

</main>
<footer class="bot-bar">
  <div class="bot-bar-inner">
    <div class="marquee">
      <span>
        CALCULADORA  [ Benny's Original ]  DZ7  -  EM CASO DE DÚVIDAS PROCURE UM GERENTE+ !!
      </span>
    </div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
